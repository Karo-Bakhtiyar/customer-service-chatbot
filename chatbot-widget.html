<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Customer Support Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5}
:root{--vh:1vh;--brand-color:#007bff;--brand-color-dark:#0056b3}

#chat-toggle{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  width:90px;height:90px;
  background:linear-gradient(135deg,var(--brand-color),var(--brand-color-dark));
  border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:4px;
  box-shadow:0 6px 30px rgba(0,0,0,.2);
  transition:transform .3s,box-shadow .3s;z-index:99999;border:none;
}
#chat-toggle:hover{transform:translateX(-50%) scale(1.1);box-shadow:0 8px 35px rgba(0,0,0,.3)}
#chat-toggle svg{width:36px;height:36px;fill:#fff}
#chat-toggle span{font-size:12px;font-weight:600;color:#fff}

#chat-container{
  position:fixed;bottom:96px;right:24px;width:400px;height:550px;
  background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
  transform:translateY(20px);opacity:0;pointer-events:none;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  display:flex;flex-direction:column;z-index:99998;
}
#chat-container.open{transform:translateY(0);opacity:1;pointer-events:auto}

#chat-header{
  background:linear-gradient(135deg,var(--brand-color),var(--brand-color-dark));padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#chat-header h3{color:#fff;font-size:16px;font-weight:600}
#chat-close{
  background:none;border:none;cursor:pointer;padding:4px;
  border-radius:50%;transition:background .2s;display:flex;
  align-items:center;justify-content:center;
}
#chat-close:hover{background:rgba(255,255,255,.2)}
#chat-close svg{width:18px;height:18px;fill:#fff}

#chat-messages{
  flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;
  gap:10px;background:#f9f5f6;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45;word-wrap:break-word}
.msg.bot{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.user{background:var(--brand-color);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}

.typing-indicator{display:none;gap:4px;padding:10px 14px;background:#fff;
  align-self:flex-start;border-radius:14px;border-bottom-left-radius:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.typing-indicator span{width:7px;height:7px;background:#bbb;border-radius:50%;
  animation:typingBounce 1.4s infinite ease-in-out}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

#chat-input-wrap{
  padding:12px;background:#fff;border-top:1px solid #eee;
  display:none;gap:8px;align-items:center;flex-shrink:0;
}
#chat-input{
  flex:1;padding:10px 14px;border:1px solid #e0e0e0;border-radius:24px;
  font-size:14px;outline:none;transition:border-color .2s;
}
#chat-input:focus{border-color:var(--brand-color-dark)}
#chat-input::placeholder{color:#aaa}
#chat-send{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand-color),var(--brand-color-dark));
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s;flex-shrink:0;
}
#chat-send:hover{transform:scale(1.08)}
#chat-send:disabled{opacity:.5;cursor:not-allowed;transform:none}
#chat-send svg{width:18px;height:18px;fill:#fff}

@media(max-width:480px){
  #chat-toggle{
    bottom:max(16px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    width:80px;height:80px;
  }
  #chat-container{
    position:fixed;top:0;left:0;width:100%;
    height:calc(var(--vh,1vh)*100);border-radius:0;max-height:100dvh;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  }
  #chat-header{padding-top:max(14px,env(safe-area-inset-top));min-height:56px}
  #chat-close{width:44px;height:44px}
  #chat-close svg{width:22px;height:22px}
  #chat-input-wrap{padding:max(12px,env(safe-area-inset-bottom)) 12px 12px;min-height:64px}
  #chat-input{font-size:16px;padding:14px 18px;min-height:48px}
  #chat-send{width:50px;height:50px}
  #chat-send svg{width:22px;height:22px}
}
</style>
</head>
<body>
<script src="config.js"></script>
<script>
(function(){
  const C = window.CONFIG || {};
  const NAME = C.businessName || "Support";
  const URL = C.businessUrl || "#";
  const TAGLINE = C.tagline || "How can I help you today?";
  const COLOR = C.brandColor || "#007bff";
  const COLOR_DARK = C.brandColorDark || "#0056b3";
  const OFFERINGS = C.offerings || "";
  const POLICIES = C.policies || "";
  const FAQ = C.faq || "";
  const EMAIL = C.contactEmail || "";
  const ABOUT = C.about || "";
  const API_URL = C.apiUrl || "";

  document.documentElement.style.setProperty('--brand-color', COLOR);
  document.documentElement.style.setProperty('--brand-color-dark', COLOR_DARK);

  const SYSTEM_PROMPT = `You are a friendly customer support chatbot for ${NAME}. Be helpful, concise, and warm. Keep responses under 3 sentences unless listing items. Use the data below to answer questions accurately.

## Business Info
- Website: ${URL}
- Tagline: ${TAGLINE}

## What We Offer
${OFFERINGS}

## Policies
${POLICIES}

## FAQ
${FAQ}

## Contact
${EMAIL}

If you don't know the answer, say "I'm not sure about that, but you can contact us at ${EMAIL} for help." Never make up names, prices, or policies. If asked about something not in your data, direct them to contact support.`;

  const FALLBACKS = [
    { k: ['product','item','buy','purchase','shop','service'], r: `Check out what we offer at ${URL}. What are you looking for?` },
    { k: ['price','cost','how much'], r: `Visit ${URL} to see all pricing!` },
    { k: ['shipping','delivery','ship'], r: `Check ${URL} for shipping details!` },
    { k: ['return','refund','exchange'], r: `Visit ${URL} for our return policy.` },
    { k: ['contact','email','support','help'], r: `Reach us at ${EMAIL}. We're happy to help!` },
    { k: ['discount','coupon','sale','code'], r: `Check ${URL} for current promotions!` },
    { k: ['who','about','story'], r: ABOUT || "We're a small team passionate about what we do!" }
  ];

  function getFallback(msg){
    const l = msg.toLowerCase();
    for(const f of FALLBACKS){ if(f.k.some(k => l.includes(k))) return f.r; }
    return `Thanks for your message! Visit ${URL} or email ${EMAIL} for help. Our team replies within 24 hours.`;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  // Build DOM
  const toggle = document.createElement('button');
  toggle.id = 'chat-toggle';
  toggle.setAttribute('aria-label', 'Open chat');
  toggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>Chat</span>';

  const el = document.createElement('div');
  el.id = 'chat-container';
  el.innerHTML = `
    <div id="chat-header">
      <h3>${escapeHtml(NAME)}</h3>
      <button id="chat-close" aria-label="Close chat">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="chat-messages">
      <div class="msg bot">Hi! Welcome to ${escapeHtml(NAME)}. ${escapeHtml(TAGLINE)}</div>
      <div id="typing" class="typing-indicator"><span></span><span></span><span></span></div>
    </div>
    <div id="chat-input-wrap">
      <input id="chat-input" type="text" placeholder="Type your message..." autocomplete="off">
      <button id="chat-send" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>`;

  document.body.appendChild(toggle);
  document.body.appendChild(el);

  const $ = id => document.getElementById(id);
  const chatClose = $('chat-close');
  const messages = $('chat-messages');
  const input = $('chat-input');
  const send = $('chat-send');
  const typing = $('typing');

  let open = false;
  let history = [];

  function toggleChat(){
    open = !open;
    el.classList.toggle('open', open);
    toggle.style.display = open ? 'none' : 'flex';
    if(open) input.focus();
  }

  toggle.addEventListener('click', toggleChat);
  chatClose.addEventListener('click', toggleChat);

  function renderMd(t){
    return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>')
            .replace(/\n/g,'<br>');
  }

  function addMsg(text, who){
    const d = document.createElement('div');
    d.className = 'msg ' + who;
    d.innerHTML = who === 'bot' ? renderMd(text) : escapeHtml(text);
    messages.insertBefore(d, typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping(){ typing.style.display = 'flex'; messages.scrollTop = messages.scrollHeight; }
  function hideTyping(){ typing.style.display = 'none'; }

  async function sendMsg(){
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    addMsg(text, 'user');
    history.push({role:'user', content:text});
    showTyping();
    send.disabled = true;

    try{
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 30000);
      const res = await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({messages:[{role:'system',content:SYSTEM_PROMPT},...history]}),
        signal: ctrl.signal
      });
      clearTimeout(t);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content?.trim() || '';
      if(reply){
        addMsg(reply, 'bot');
        history.push({role:'assistant', content:reply});
      } else {
        throw new Error('Empty response');
      }
    } catch(err){
      const fb = getFallback(text);
      addMsg(fb, 'bot');
      history.push({role:'assistant', content:fb});
    }

    hideTyping();
    send.disabled = false;
  }

  send.addEventListener('click', sendMsg);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') sendMsg(); });

  if(window.visualViewport){
    const setVh = () => document.documentElement.style.setProperty('--vh', window.visualViewport.height * 0.01 + 'px');
    window.visualViewport.addEventListener('resize', setVh);
    setVh();
  }

  input.addEventListener('focus', () => setTimeout(() => messages.scrollTop = messages.scrollHeight, 100));
  toggle.addEventListener('click', () => setTimeout(() => input.focus(), 350));
})();
</script>
</body>
</html>
